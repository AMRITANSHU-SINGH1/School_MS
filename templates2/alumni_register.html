{% extends "base_social.html" %}

{% block title %}Alumni Registration{% endblock %}

{% block content %}
<div class="min-h-screen bg-gray-50 flex items-center justify-center py-12 px-4">
    <div class="bg-white rounded-lg shadow-lg p-8 max-w-md w-full">
        <div class="text-center mb-8">
            <h1 class="font-bold text-3xl text-blue-600">🎓</h1>
            <h2 class="font-bold text-2xl text-gray-900 mt-2">Alumni Registration</h2>
            <p class="text-gray-600 mt-2">Join our alumni network</p>
        </div>

        <form method="POST" class="space-y-4">
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Full Name *</label>
                <input type="text" name="name" required placeholder="Enter your name"
                       class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Email *</label>
                <input type="email" name="email" required placeholder="Enter your email"
                       class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Password *</label>
                <input type="password" name="password" required placeholder="Create a password"
                       class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Graduation Year  *</label>
                <input type="number" name="graduation_year" required min="1980" max="2099" placeholder="e.g., 2023"
                       class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
            </div>

            <!-- <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Degree</label>
                <input type="text" name="degree" placeholder="e.g., Bachelor of Engineering"
                       class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Major</label>
                <input type="text" name="major" placeholder="e.g., Computer Science"
                       class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
            </div> -->

            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Phone</label>
                <input type="tel" name="phone" placeholder="Enter your phone number"
                       class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
            </div>

            <button type="submit" class="w-full px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 font-medium">
                Register
            </button>

            <p class="text-center text-gray-600 text-sm">
                Already have an account? 
                <a href="{{ url_for('alumni_login') }}" class="text-blue-600 hover:text-blue-700 font-medium">Login here</a>
            </p>
        </form>
    </div>
</div>
{% endblock %}
