{% extends "base_social.html" %}

{% block title %}Create Post{% endblock %}

{% block content %}
<div class="min-h-screen bg-gray-50">
    {% include 'social_nav.html' %}
    
    <div class="max-w-2xl mx-auto px-4 py-8">
        <div class="bg-white rounded-lg shadow-md p-8">
            <h1 class="font-bold text-3xl text-gray-900 mb-8">Create a Post</h1>

            <form method="POST" enctype="multipart/form-data" class="space-y-6">
                <!-- Post Content -->
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">What's on your mind?</label>
                    <textarea name="content" rows="6" required placeholder="Share your thoughts, achievements, or experiences..."
                              class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 resize-vertical"></textarea>
                    <p class="text-xs text-gray-600 mt-1">Max 2000 characters</p>
                </div>

                <!-- Image Upload -->
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">Add Image (Optional)</label>
                    <div class="border-2 border-dashed border-gray-300 rounded-lg p-8 text-center hover:border-blue-500 transition cursor-pointer">
                        <input type="file" name="image" accept="image/*" class="hidden" id="image-input">
                        <label for="image-input" class="cursor-pointer">
                            <svg class="w-12 h-12 mx-auto text-gray-400 mb-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"></path>
                            </svg>
                            <p class="text-gray-600">Click to upload an image or drag and drop</p>
                            <p class="text-xs text-gray-500 mt-1">PNG, JPG up to 5MB</p>
                        </label>
                    </div>
                </div>

                <!-- Buttons -->
                <div class="flex space-x-4 pt-6 border-t">
                    <button type="submit" class="px-6 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 font-medium">
                        Post
                    </button>
                    <a href="{{ url_for('social_dashboard') }}" class="px-6 py-2 border border-gray-300 text-gray-700 rounded-lg hover:bg-gray-50">
                        Cancel
                    </a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
