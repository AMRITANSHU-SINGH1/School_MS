{% extends "base_social.html" %}

{% block title %}Edit Skill{% endblock %}

{% block content %}
<div class="min-h-screen bg-gray-50">
    {% include 'social_nav.html' %}
    
    <div class="max-w-2xl mx-auto px-4 py-8">
        <div class="bg-white rounded-lg shadow-md p-8">
            <h1 class="font-bold text-3xl text-gray-900 mb-8">Edit Skill</h1>

            <form method="POST" class="space-y-6">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">Skill Name *</label>
                    <input type="text" name="name" value="{{ skill.name }}" required
                           class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">Proficiency Level *</label>
                    <select name="proficiency" required class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
                        <option value="Beginner" {% if skill.proficiency == 'Beginner' %}selected{% endif %}>Beginner</option>
                        <option value="Intermediate" {% if skill.proficiency == 'Intermediate' %}selected{% endif %}>Intermediate</option>
                        <option value="Advanced" {% if skill.proficiency == 'Advanced' %}selected{% endif %}>Advanced</option>
                        <option value="Expert" {% if skill.proficiency == 'Expert' %}selected{% endif %}>Expert</option>
                    </select>
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">Category *</label>
                    <select name="category" required class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
                        <option value="Technical" {% if skill.category == 'Technical' %}selected{% endif %}>Technical</option>
                        <option value="Soft Skills" {% if skill.category == 'Soft Skills' %}selected{% endif %}>Soft Skills</option>
                        <option value="Languages" {% if skill.category == 'Languages' %}selected{% endif %}>Languages</option>
                        <option value="Design" {% if skill.category == 'Design' %}selected{% endif %}>Design</option>
                        <option value="Business" {% if skill.category == 'Business' %}selected{% endif %}>Business</option>
                        <option value="Other" {% if skill.category == 'Other' %}selected{% endif %}>Other</option>
                    </select>
                </div>

                <div class="flex space-x-4 pt-6 border-t">
                    <button type="submit" class="px-6 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 font-medium">
                        Save Changes
                    </button>
                    <form method="POST" action="{{ url_for('delete_skill', skill_id=skill.id) }}" style="display:inline;" onsubmit="return confirm('Delete this skill?');">
                        <button type="submit" class="px-6 py-2 bg-red-600 text-white rounded-lg hover:bg-red-700 font-medium">
                            Delete
                        </button>
                    </form>
                    <a href="{{ url_for('my_profile') }}" class="px-6 py-2 border border-gray-300 text-gray-700 rounded-lg hover:bg-gray-50">
                        Cancel
                    </a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
