{% extends "base_social.html" %}

{% block title %}Edit Experience{% endblock %}

{% block content %}
<div class="min-h-screen bg-gray-50">
    {% include 'social_nav.html' %}
    
    <div class="max-w-2xl mx-auto px-4 py-8">
        <div class="bg-white rounded-lg shadow-md p-8">
            <h1 class="font-bold text-3xl text-gray-900 mb-8">Edit Experience</h1>

            <form method="POST" class="space-y-6">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">Position Title *</label>
                    <input type="text" name="title" value="{{ experience.title }}" required
                           class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">Company/Organization *</label>
                    <input type="text" name="company" value="{{ experience.company }}" required
                           class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">Location</label>
                    <input type="text" name="location" value="{{ experience.location or '' }}"
                           class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">Start Date *</label>
                        <input type="date" name="start_date" value="{{ experience.start_date }}" required
                               class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">End Date</label>
                        <input type="date" name="end_date" value="{{ experience.end_date or '' }}" id="end_date"
                               class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500" {% if experience.is_current %}disabled{% endif %}>
                    </div>
                </div>

                <label class="flex items-center space-x-3 cursor-pointer">
                    <input type="checkbox" name="is_current" id="is_current" {% if experience.is_current %}checked{% endif %}
                           class="w-4 h-4 text-blue-600 rounded focus:ring-2 focus:ring-blue-500"
                           onchange="document.getElementById('end_date').disabled = this.checked; document.getElementById('end_date').value = '';">
                    <span class="text-gray-700">I currently work here</span>
                </label>

                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">Description</label>
                    <textarea name="description" rows="4"
                              class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 resize-none">{{ experience.description or '' }}</textarea>
                </div>

                <div class="flex space-x-4 pt-6 border-t">
                    <button type="submit" class="px-6 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 font-medium">
                        Save Changes
                    </button>
                    <form method="POST" action="{{ url_for('delete_experience', exp_id=experience.id) }}" style="display:inline;" onsubmit="return confirm('Delete this experience?');">
                        <button type="submit" class="px-6 py-2 bg-red-600 text-white rounded-lg hover:bg-red-700 font-medium">
                            Delete
                        </button>
                    </form>
                    <a href="{{ url_for('my_profile') }}" class="px-6 py-2 border border-gray-300 text-gray-700 rounded-lg hover:bg-gray-50">
                        Cancel
                    </a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
