{% extends "base_social.html" %}

{% block title %}Edit Hobby{% endblock %}

{% block content %}
<div class="min-h-screen bg-gray-50">
    {% include 'social_nav.html' %}
    
    <div class="max-w-2xl mx-auto px-4 py-8">
        <div class="bg-white rounded-lg shadow-md p-8">
            <h1 class="font-bold text-3xl text-gray-900 mb-8">Edit Hobby/Interest</h1>

            <form method="POST" class="space-y-6">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">Hobby/Interest Name *</label>
                    <input type="text" name="name" value="{{ hobby.name }}" required
                           class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">Category *</label>
                    <select name="category" required class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
                        <option value="Sports" {% if hobby.category == 'Sports' %}selected{% endif %}>Sports</option>
                        <option value="Arts" {% if hobby.category == 'Arts' %}selected{% endif %}>Arts & Crafts</option>
                        <option value="Music" {% if hobby.category == 'Music' %}selected{% endif %}>Music</option>
                        <option value="Reading" {% if hobby.category == 'Reading' %}selected{% endif %}>Reading</option>
                        <option value="Gaming" {% if hobby.category == 'Gaming' %}selected{% endif %}>Gaming</option>
                        <option value="Outdoor" {% if hobby.category == 'Outdoor' %}selected{% endif %}>Outdoor Activities</option>
                        <option value="Technology" {% if hobby.category == 'Technology' %}selected{% endif %}>Technology</option>
                        <option value="Travel" {% if hobby.category == 'Travel' %}selected{% endif %}>Travel</option>
                        <option value="Cooking" {% if hobby.category == 'Cooking' %}selected{% endif %}>Cooking</option>
                        <option value="Other" {% if hobby.category == 'Other' %}selected{% endif %}>Other</option>
                    </select>
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">Description</label>
                    <textarea name="description" rows="4"
                              class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 resize-none">{{ hobby.description or '' }}</textarea>
                </div>

                <div class="flex space-x-4 pt-6 border-t">
                    <button type="submit" class="px-6 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 font-medium">
                        Save Changes
                    </button>
                    <form method="POST" action="{{ url_for('delete_hobby', hobby_id=hobby.id) }}" style="display:inline;" onsubmit="return confirm('Delete this hobby?');">
                        <button type="submit" class="px-6 py-2 bg-red-600 text-white rounded-lg hover:bg-red-700 font-medium">
                            Delete
                        </button>
                    </form>
                    <a href="{{ url_for('my_profile') }}" class="px-6 py-2 border border-gray-300 text-gray-700 rounded-lg hover:bg-gray-50">
                        Cancel
                    </a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
