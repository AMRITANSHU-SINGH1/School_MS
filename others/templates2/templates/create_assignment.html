{% extends 'base.html' %}
{% block title %}Create Assignment{% endblock %}
{% block content %}
<h2 class="text-3xl font-bold text-gray-800 mb-6">Create Assignment</h2>

<form method="post" enctype="multipart/form-data" class="bg-white shadow-lg rounded-lg p-6">
    <div class="mb-4">
        <label class="block text-gray-700 font-semibold mb-2">Title</label>
        <input name="title" type="text" class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500" required>
    </div>

    <div class="mb-4">
        <label class="block text-gray-700 font-semibold mb-2">Description</label>
        <textarea name="description" rows="4" class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500" required></textarea>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-4">
        <div>
            <label class="block text-gray-700 font-semibold mb-2">Class & Subject</label>
            <select name="class_subject_id" class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500" required>
                <option value="">Select</option>
                {% for cs in my_classes %}
                <option value="{{ cs.id }}">{{ cs.class_obj.name }} - {{ cs.subject.name }}</option>
                {% endfor %}
            </select>
        </div>
        <div>
            <label class="block text-gray-700 font-semibold mb-2">Due Date</label>
            <input type="date" name="due_date" class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500" required>
        </div>
        <div>
            <label class="block text-gray-700 font-semibold mb-2">Total Marks</label>
            <input name="total_marks" type="number" step="0.01" class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500" required>
        </div>
    </div>

    <div class="mb-6">
        <label class="block text-gray-700 font-semibold mb-2">Attachment (optional)</label>
        <input type="file" name="attachment" class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500">
    </div>

    <div class="flex gap-4">
        <button type="submit" class="bg-green-500 hover:bg-green-600 text-white px-6 py-2 rounded-lg font-semibold">Create</button>
        <a href="{{ url_for('teacher_assignments') }}" class="bg-gray-500 hover:bg-gray-600 text-white px-6 py-2 rounded-lg font-semibold">Cancel</a>
    </div>
</form>
{% endblock %}
