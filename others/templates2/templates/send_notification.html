{% extends 'base.html' %}
{% block title %}Send Notification{% endblock %}
{% block content %}
<h2 class="text-3xl font-bold text-gray-800 mb-6">Send Notification to Class</h2>

<form method="post" class="bg-white shadow-lg rounded-lg p-6">
    <div class="mb-4">
        <label class="block text-gray-700 font-semibold mb-2">Select Class</label>
        <select name="class_id" class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500" required>
            <option value="">Select class</option>
            {% for c in classes %}
            <option value="{{ c.class_id }}">{{ c.name }}</option>
            {% endfor %}
        </select>
    </div>

    <div class="mb-4">
        <label class="block text-gray-700 font-semibold mb-2">Title</label>
        <input name="title" type="text" class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500" required>
    </div>

    <div class="mb-4">
        <label class="block text-gray-700 font-semibold mb-2">Message</label>
        <textarea name="message" rows="5" class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500" required></textarea>
    </div>

    <div class="mb-6 flex items-center">
        <input type="checkbox" name="is_urgent" id="urgent" class="w-4 h-4 text-blue-600 rounded focus:ring-blue-500">
        <label for="urgent" class="ml-2 text-gray-700 font-semibold">Mark as Urgent</label>
    </div>

    <div class="flex gap-4">
        <button type="submit" class="bg-green-500 hover:bg-green-600 text-white px-6 py-2 rounded-lg font-semibold">Send</button>
        <a href="{{ url_for('teacher_notifications') }}" class="bg-gray-500 hover:bg-gray-600 text-white px-6 py-2 rounded-lg font-semibold">Cancel</a>
    </div>
</form>
{% endblock %}
