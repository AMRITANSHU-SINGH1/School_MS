{% extends 'base.html' %}
{% block title %}Add Marks{% endblock %}
{% block content %}
<h2 class="text-3xl font-bold text-gray-800 mb-2">Add Marks</h2>
<p class="text-gray-600 mb-6">{{ class_subject.class_obj.name }} - {{ class_subject.subject.name }}</p>

<form method="post" class="bg-white shadow-lg rounded-lg p-6">
    <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-6">
        <div>
            <label class="block text-gray-700 font-semibold mb-2">Exam Type</label>
            <input name="exam_type" type="text" placeholder="Unit Test 1" class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500" required>
        </div>
        <div>
            <label class="block text-gray-700 font-semibold mb-2">Total Marks</label>
            <input name="total_marks" type="number" step="0.01" class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500" required>
        </div>
        <div>
            <label class="block text-gray-700 font-semibold mb-2">Date</label>
            <input type="date" name="date" value="{{ date.today().isoformat() }}" class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500">
        </div>
    </div>

    <div class="overflow-x-auto">
        <table class="min-w-full divide-y divide-gray-200">
            <thead class="bg-gray-50">
                <tr>
                    <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Student</th>
                    <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Marks Obtained</th>
                    <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Remarks</th>
                </tr>
            </thead>
            <tbody class="bg-white divide-y divide-gray-200">
                {% for s in students %}
                <tr class="hover:bg-gray-50">
                    <td class="px-6 py-4 whitespace-nowrap text-sm font-medium text-gray-900">
                        {{ s.name }} <span class="text-gray-500">({{ s.student_id }})</span>
                    </td>
                    <td class="px-6 py-4 whitespace-nowrap">
                        <input name="marks_{{ s.student_id }}" type="number" step="0.01" class="border border-gray-300 rounded-lg px-3 py-2 w-full focus:outline-none focus:ring-2 focus:ring-blue-500">
                    </td>
                    <td class="px-6 py-4">
                        <input name="remarks_{{ s.student_id }}" class="border border-gray-300 rounded-lg px-3 py-2 w-full focus:outline-none focus:ring-2 focus:ring-blue-500">
                    </td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>

    <div class="flex gap-4 mt-6">
        <button type="submit" class="bg-green-500 hover:bg-green-600 text-white px-6 py-3 rounded-lg font-semibold">Save Marks</button>
        <a href="{{ url_for('marks_home') }}" class="bg-gray-500 hover:bg-gray-600 text-white px-6 py-3 rounded-lg font-semibold">Cancel</a>
    </div>
</form>
{% endblock %}
