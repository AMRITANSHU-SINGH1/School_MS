{% extends 'base.html' %}
{% block title %}Submit Assignment{% endblock %}
{% block content %}
<h2 class="text-3xl font-bold text-gray-800 mb-4">Submit: {{ assignment.title }}</h2>

<div class="bg-blue-50 border-l-4 border-blue-500 p-4 mb-6 rounded">
    <p class="text-blue-800"><strong>Due Date:</strong> {{ assignment.due_date }}</p>
</div>

<form method="post" enctype="multipart/form-data" class="bg-white shadow-lg rounded-lg p-6">
    <div class="mb-4">
        <label class="block text-gray-700 font-semibold mb-2">Submission Link (optional)</label>
        <input name="submission_link" type="url" placeholder="https://..." class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500">
    </div>

    <div class="mb-4">
        <label class="block text-gray-700 font-semibold mb-2">OR Upload File</label>
        <input type="file" name="file" class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500">
    </div>

    <p class="text-gray-500 text-sm mb-6">You can provide either a link or upload a file (or both).</p>

    <div class="flex gap-4">
        <button type="submit" class="bg-green-500 hover:bg-green-600 text-white px-6 py-2 rounded-lg font-semibold">Submit</button>
        <a href="{{ url_for('view_assignment', assignment_id=assignment.id) }}" class="bg-gray-500 hover:bg-gray-600 text-white px-6 py-2 rounded-lg font-semibold">Cancel</a>
    </div>
</form>
{% endblock %}
