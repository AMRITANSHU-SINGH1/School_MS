{% extends 'base.html' %}
{% block title %}Add Class{% endblock %}
{% block content %}
<div class="max-w-2xl mx-auto bg-white shadow-lg rounded-lg p-8">
    <h2 class="text-2xl font-bold text-gray-800 mb-6">Add Class</h2>
    <form method="post">
        <div class="mb-4">
            <label class="block text-gray-700 font-semibold mb-2">Class Name</label>
            <input name="name" type="text" placeholder="Class 3-A" class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500" required>
        </div>
        <div class="mb-4">
            <label class="block text-gray-700 font-semibold mb-2">Section</label>
            <input name="section" type="text" placeholder="A" class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500">
        </div>
        <div class="mb-4">
            <label class="block text-gray-700 font-semibold mb-2">Grade</label>
            <select name="grade_id" class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500" required>
                <option value="">Select grade</option>
                {% for g in grades %}
                <option value="{{ g.grade_id }}">{{ g.name }} (Level {{ g.level }})</option>
                {% endfor %}
            </select>
        </div>
        <div class="mb-6">
            <label class="block text-gray-700 font-semibold mb-2">Class Teacher (optional)</label>
            <select name="head" class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500">
                <option value="">-- None --</option>
                {% for t in teachers %}
                <option value="{{ t.teacher_id }}">{{ t.name }} ({{ t.teacher_id }})</option>
                {% endfor %}
            </select>
        </div>
        <div class="flex gap-4">
            <button type="submit" class="bg-green-500 hover:bg-green-600 text-white px-6 py-2 rounded-lg font-semibold">Save</button>
            <a href="{{ url_for('list_classes') }}" class="bg-gray-500 hover:bg-gray-600 text-white px-6 py-2 rounded-lg font-semibold">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
