{% extends 'base.html' %}
{% block title %}Add Grade{% endblock %}
{% block content %}
<div class="max-w-2xl mx-auto bg-white shadow-lg rounded-lg p-8">
    <h2 class="text-2xl font-bold text-gray-800 mb-6">Add Grade</h2>
    <form method="post">
        <div class="mb-4">
            <label class="block text-gray-700 font-semibold mb-2">Grade Name</label>
            <input name="name" type="text" placeholder="Grade 1" class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500" required>
        </div>
        <div class="mb-6">
            <label class="block text-gray-700 font-semibold mb-2">Level (number)</label>
            <input name="level" type="number" min="1" class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500" required>
        </div>
        <div class="flex gap-4">
            <button type="submit" class="bg-green-500 hover:bg-green-600 text-white px-6 py-2 rounded-lg font-semibold">Save</button>
            <a href="{{ url_for('list_grades') }}" class="bg-gray-500 hover:bg-gray-600 text-white px-6 py-2 rounded-lg font-semibold">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
