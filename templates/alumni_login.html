{% extends "base_social.html" %}

{% block title %}Alumni Login{% endblock %}

{% block content %}
<div class="min-h-screen bg-gray-50 flex items-center justify-center py-12 px-4">
    <div class="bg-white rounded-lg shadow-lg p-8 max-w-md w-full">
        <div class="text-center mb-8">
            <h1 class="font-bold text-3xl text-blue-600">🎓</h1>
            <h2 class="font-bold text-2xl text-gray-900 mt-2">Alumni Login</h2>
            <p class="text-gray-600 mt-2">Welcome back!</p>
        </div>

        <form method="POST" class="space-y-4">
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Email</label>
                <input type="email" name="email" required placeholder="Enter your email"
                       class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Password</label>
                <input type="password" name="password" required placeholder="Enter your password"
                       class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
            </div>

            <button type="submit" class="w-full px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 font-medium">
                Login
            </button>

            <p class="text-center text-gray-600 text-sm">
                Don't have an account? 
                <a href="{{ url_for('alumni_register') }}" class="text-blue-600 hover:text-blue-700 font-medium">Register here</a>
            </p>
        </form>
    </div>
</div>
{% endblock %}
