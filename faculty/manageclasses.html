<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Manage Classes - SmartEdu Admin</title>

  <link href="https://fonts.googleapis.com/css2?family=Merriweather:wght@700&family=Open+Sans:wght@400;600;700&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>

  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            'dark-blue': '#0a1a2f',
            'mid-blue': '#1f3b63',
            'light-blue-bg': '#2a4a75',
            'accent': '#d4a056',
            'white': '#ffffff',
          },
          fontFamily: {
            'sans': ['Open Sans', 'sans-serif'],
            'serif': ['Merriweather', 'serif'],
          },
        },
      },
    };
  </script>

  <style>
    body { font-family: 'Open Sans', sans-serif; }

    ::-webkit-scrollbar { width: 8px; }
    ::-webkit-scrollbar-track { background: #0a1a2f; }
    ::-webkit-scrollbar-thumb { background: #1f3b63; border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: #d4a056; }

    /* REMOVE the white strip completely */
    #footer-slant-container {
        background: #0a1a2f !important;  /* Full dark blue */
    }

    .footer-slant {
        clip-path: polygon(0 20%, 100% 0, 100% 100%, 0% 100%);
    }

  </style>
</head>

<body class="flex min-h-screen bg-dark-blue text-dark-blue font-sans">

  <!-- SIDEBAR -->
  <aside id="sidebar" class="w-64 bg-dark-blue text-white shadow-xl flex flex-col transition-all duration-300 overflow-hidden whitespace-nowrap fixed h-full z-20">
    <div class="p-6 flex items-center space-x-3 border-b border-gray-700">
      <div class="w-8 h-8 rounded bg-accent text-dark-blue flex items-center justify-center font-serif font-bold flex-shrink-0">A</div>
      <h1 class="text-xl font-serif text-accent">Admin Portal</h1>
    </div>

    <nav class="flex-grow p-4 space-y-2 overflow-y-auto">
      <div class="text-xs font-semibold text-gray-400 uppercase tracking-wider mb-1 mt-2">Overview</div>
      <button class="nav-btn w-full text-left p-3 rounded hover:bg-mid-blue transition-colors flex items-center">
        <span class="ml-1">Dashboard</span>
      </button>

      <div class="text-xs font-semibold text-gray-400 uppercase tracking-wider mb-1 mt-4">Academics</div>
      <button class="nav-btn w-full text-left p-3 rounded hover:bg-mid-blue transition-colors flex items-center bg-mid-blue text-accent">
        <span class="ml-1">Manage Classes</span>
      </button>
      <button class="nav-btn w-full text-left p-3 rounded hover:bg-mid-blue transition-colors flex items-center">
        <span class="ml-1">Manage Subjects</span>
      </button>

      <div class="text-xs font-semibold text-gray-400 uppercase tracking-wider mb-1 mt-4">People</div>
      <button class="nav-btn w-full text-left p-3 rounded hover:bg-mid-blue transition-colors flex items-center">
        <span class="ml-1">Faculty / Teachers</span>
      </button>
      <button class="nav-btn w-full text-left p-3 rounded hover:bg-mid-blue transition-colors flex items-center">
        <span class="ml-1">Students</span>
      </button>

      <div class="text-xs font-semibold text-gray-400 uppercase tracking-wider mb-1 mt-4">Operations</div>
      <button class="nav-btn w-full text-left p-3 rounded hover:bg-mid-blue transition-colors flex items-center">
        <span class="ml-1">Course Mapping</span>
      </button>
      <button class="nav-btn w-full text-left p-3 rounded hover:bg-mid-blue transition-colors flex items-center">
        <span class="ml-1">Update Schedule</span>
      </button>
    </nav>
  </aside>


  <!-- MAIN CONTENT -->
  <div id="mainContent" class="flex-1 flex flex-col md:ml-64 min-h-screen transition-all duration-300">

    <!-- HEADER -->
    <header class="bg-white shadow-sm p-4 flex justify-between items-center sticky top-0 z-10">
      <button onclick="toggleSidebar()" class="mr-4 text-dark-blue hover:text-accent transition-colors">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-8 h-8">
          <path stroke-linecap="round" stroke-linejoin="round" d="M3.75 6.75h16.5M3.75 12h16.5m-16.5 5.25h16.5" />
        </svg>
      </button>

      <h2 class="text-xl font-bold text-dark-blue font-serif">Manage Classes</h2>

      <div class="flex items-center space-x-4">
        <span class="text-sm font-semibold text-gray-600 hidden md:inline">Administrator</span>
        <div class="w-10 h-10 rounded-full bg-dark-blue text-white flex items-center justify-center font-bold shadow-md">AD</div>
      </div>
    </header>


    <!-- PAGE CONTENT -->
    <main class="p-8">

      <div class="max-w-5xl mx-auto space-y-8">

        <!-- ADD NEW CLASS -->
        <div class="bg-white p-8 rounded-lg shadow-lg border-t-4 border-accent">
          <h3 class="text-xl font-serif font-bold text-dark-blue mb-6">Add New Class</h3>

          <div class="flex flex-col md:flex-row gap-6 items-end">
            <div class="flex-1">
              <label class="block text-sm font-bold text-gray-700 mb-2">Class Name</label>
              <input type="text" id="classInput" placeholder="e.g. Class 10" class="w-full p-3 border border-gray-300 rounded focus:ring-2 focus:ring-mid-blue outline-none">
            </div>

            <div class="flex-1">
              <label class="block text-sm font-bold text-gray-700 mb-2">Section</label>
              <input type="text" id="sectionInput" placeholder="e.g. A" class="w-full p-3 border border-gray-300 rounded focus:ring-2 focus:ring-mid-blue outline-none">
            </div>

            <button onclick="addClass()" class="bg-mid-blue text-white px-8 py-3 rounded hover:bg-dark-blue transition shadow-lg">
              Create Class
            </button>
          </div>
        </div>


        <!-- CLASS GRID -->
        <div class="bg-white p-8 rounded-lg shadow-lg">
          <div class="flex justify-between items-center mb-6 border-b pb-2">
            <h3 class="text-xl font-serif font-bold text-dark-blue">Existing Classes</h3>
          </div>

          <div id="classList" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6">

            <!-- Sample item -->
            <div class="relative group p-6 bg-gray-50 border rounded-xl hover:shadow-lg transition">
              <div class="w-12 h-12 bg-blue-100 text-mid-blue rounded-full flex items-center justify-center mb-3">10</div>
              <span class="font-bold text-lg text-dark-blue">Class 10</span>
              <span class="text-sm text-gray-500 mt-1">Section A</span>
            </div>

          </div>
        </div>

      </div>
    </main>


    <!-- FOOTER -->
    <footer class="mt-auto">
      <div id="footer-slant-container">
        <div class="footer-slant bg-mid-blue text-white pt-24 pb-10 px-8">
          <div class="container mx-auto flex justify-between">
            <div>
              <h3 class="text-xl font-serif text-accent">SmartEdu Admin</h3>
              <p class="text-xs text-gray-300">Restricted Access Area</p>
            </div>
            <div class="text-xs text-gray-400">&copy; 2025 SmartEdu Inc.</div>
          </div>
        </div>
      </div>
    </footer>

  </div>


  <!-- JS -->
  <script>
    function addClass() {
      const className = document.getElementById('classInput').value;
      const section = document.getElementById('sectionInput').value;
      const list = document.getElementById('classList');

      if (!className || !section) {
        alert("Enter both Class Name and Section.");
        return;
      }

      const div = document.createElement("div");
      div.className = "relative group p-6 bg-gray-50 border rounded-xl hover:shadow-lg transition";

      div.innerHTML = `
        <div class="w-12 h-12 bg-blue-100 text-mid-blue rounded-full flex items-center justify-center mb-3">${className.match(/\d+/)}</div>
        <span class="font-bold text-lg text-dark-blue">${className}</span>
        <span class="text-sm text-gray-500 mt-1">Section ${section}</span>
      `;

      list.appendChild(div);
    }

    function toggleSidebar() {
      const sidebar = document.getElementById("sidebar");
      const main = document.getElementById("mainContent");

      sidebar.classList.toggle("w-0");
      sidebar.classList.toggle("w-64");
      main.classList.toggle("md:ml-64");
    }
  </script>

</body>
</html>
