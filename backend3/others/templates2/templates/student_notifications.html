{% extends 'base.html' %}
{% block title %}Notifications{% endblock %}
{% block content %}
<h2 class="text-3xl font-bold text-gray-800 mb-6">Class Notifications</h2>

{% for n in notifications %}
<div class="bg-{{ 'red' if n.is_urgent else 'blue' }}-50 border-l-4 border-{{ 'red' if n.is_urgent else 'blue' }}-500 p-4 mb-4 rounded shadow">
    <div class="flex justify-between items-start mb-2">
        <h3 class="text-lg font-bold text-gray-800">{{ n.title }}</h3>
        <span class="text-xs text-gray-500">{{ n.date.strftime('%Y-%m-%d %H:%M') }}</span>
    </div>
    <p class="text-gray-700 mb-2">{{ n.message }}</p>
    <p class="text-sm text-gray-600">From: {{ n.teacher.name }}</p>
</div>
{% endfor %}
{% endblock %}
