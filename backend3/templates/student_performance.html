{% extends 'base.html' %}
{% block title %}Performance{% endblock %}
{% block content %}
<h2 class="text-3xl font-bold text-gray-800 mb-6">Performance Analysis</h2>
<div class="bg-white shadow-lg rounded-lg p-6">
    anvas id="performanceChart" class="w-full" height="200"></canvas>
</div>
{% endblock %}

{% block scripts %}
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script>
fetch('/api/student/marks_data')
  .then(res => res.json())
  .then(data => {
    const ctx = document.getElementById('performanceChart').getContext('2d');
    new Chart(ctx, {
      type: 'bar',
      data: {
        labels: data.subjects,
        datasets: [{
          label: 'Average %',
          data: data.averages,
          backgroundColor: 'rgba(59, 130, 246, 0.5)',
          borderColor: 'rgba(59, 130, 246, 1)',
          borderWidth: 2
        }]
      },
      options: {
        responsive: true,
        scales: {
          y: { 
            beginAtZero: true, 
            max: 100,
            ticks: {
              callback: function(value) {
                return value + '%';
              }
            }
          }
        }
      }
    });
  });
</script>
{% endblock %}
