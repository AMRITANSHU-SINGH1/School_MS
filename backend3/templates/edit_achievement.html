{% extends "base_social.html" %}

{% block title %}Edit Achievement{% endblock %}

{% block content %}
<div class="min-h-screen bg-gray-50">
    {% include 'social_nav.html' %}
    
    <div class="max-w-2xl mx-auto px-4 py-8">
        <div class="bg-white rounded-lg shadow-md p-8">
            <h1 class="font-bold text-3xl text-gray-900 mb-8">Edit Achievement</h1>

            <form method="POST" class="space-y-6">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">Achievement Title *</label>
                    <input type="text" name="title" value="{{ achievement.title }}" required
                           class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">Category *</label>
                    <select name="category" required class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
                        <option value="Academic" {% if achievement.category == 'Academic' %}selected{% endif %}>Academic</option>
                        <option value="Sports" {% if achievement.category == 'Sports' %}selected{% endif %}>Sports</option>
                        <option value="Cultural" {% if achievement.category == 'Cultural' %}selected{% endif %}>Cultural</option>
                        <option value="Professional" {% if achievement.category == 'Professional' %}selected{% endif %}>Professional</option>
                        <option value="Technical" {% if achievement.category == 'Technical' %}selected{% endif %}>Technical</option>
                        <option value="Leadership" {% if achievement.category == 'Leadership' %}selected{% endif %}>Leadership</option>
                        <option value="Other" {% if achievement.category == 'Other' %}selected{% endif %}>Other</option>
                    </select>
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">Date Achieved *</label>
                    <input type="date" name="date_achieved" value="{{ achievement.date_achieved }}" required
                           class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">Issuing Organization</label>
                    <input type="text" name="issuer" value="{{ achievement.issuer or '' }}"
                           class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">Description</label>
                    <textarea name="description" rows="4"
                              class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 resize-none">{{ achievement.description or '' }}</textarea>
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">Certificate URL</label>
                    <input type="url" name="certificate_url" value="{{ achievement.certificate_url or '' }}"
                           class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
                </div>

                <div class="flex space-x-4 pt-6 border-t">
                    <button type="submit" class="px-6 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 font-medium">
                        Save Changes
                    </button>
                    <form method="POST" action="{{ url_for('delete_achievement', achievement_id=achievement.id) }}" style="display:inline;" onsubmit="return confirm('Delete this achievement?');">
                        <button type="submit" class="px-6 py-2 bg-red-600 text-white rounded-lg hover:bg-red-700 font-medium">
                            Delete
                        </button>
                    </form>
                    <a href="{{ url_for('my_profile') }}" class="px-6 py-2 border border-gray-300 text-gray-700 rounded-lg hover:bg-gray-50">
                        Cancel
                    </a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
