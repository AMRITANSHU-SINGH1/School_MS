{% extends 'base.html' %}
{% block title %}Assign Subject{% endblock %}
{% block content %}
<div class="max-w-2xl mx-auto bg-white shadow-lg rounded-lg p-8">
    <h2 class="text-2xl font-bold text-gray-800 mb-6">Assign Subject to Class</h2>
    <form method="post">
        <div class="mb-4">
            <label class="block text-gray-700 font-semibold mb-2">Class</label>
            <select name="class_id" class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500" required>
                <option value="">Select class</option>
                {% for c in classes %}
                <option value="{{ c.class_id }}">{{ c.name }}</option>
                {% endfor %}
            </select>
        </div>
        <div class="mb-4">
            <label class="block text-gray-700 font-semibold mb-2">Subject</label>
            <select name="subject_id" class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500" required>
                <option value="">Select subject</option>
                {% for s in subjects %}
                <option value="{{ s.subject_id }}">{{ s.name }}</option>
                {% endfor %}
            </select>
        </div>
        <div class="mb-6">
            <label class="block text-gray-700 font-semibold mb-2">Teacher</label>
            <select name="teacher_id" class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500" required>
                <option value="">Select teacher</option>
                {% for t in teachers %}
                <option value="{{ t.teacher_id }}">{{ t.name }}</option>
                {% endfor %}
            </select>
        </div>
        <div class="flex gap-4">
            <button type="submit" class="bg-green-500 hover:bg-green-600 text-white px-6 py-2 rounded-lg font-semibold">Assign</button>
            <a href="{{ url_for('view_class_subjects') }}" class="bg-blue-500 hover:bg-blue-600 text-white px-6 py-2 rounded-lg font-semibold">View All</a>
        </div>
    </form>
</div>
{% endblock %}
